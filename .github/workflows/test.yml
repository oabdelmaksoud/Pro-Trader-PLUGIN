name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -e .
    
    - name: Run import tests (no API keys needed)
      run: |
        python -m pytest tests/test_broker.py::test_imports -v
        python -m pytest tests/test_broker.py::test_market_hours -v
        python -m pytest tests/test_broker.py::test_ledger -v
      # Note: broker connectivity tests skipped in CI (need Alpaca keys)
